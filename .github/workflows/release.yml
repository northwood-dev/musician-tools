name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "🎵 Musician Tools ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            > Full changelog below, generated from commits since the last release.
